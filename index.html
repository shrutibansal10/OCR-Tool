<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Address Scanner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0; min-height: 100vh;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 1.5rem 1rem; color: #1a1a1a;
  }
  .app { width: 100%; max-width: 560px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.02em; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.25rem; }

  .cam-card { background: #fff; border-radius: 14px; border: 1px solid #e2e0d8; overflow: hidden; margin-bottom: 1.25rem; }
  .cam-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; border-bottom: 1px solid #f0ede6; }
  .cam-title { font-size: 13px; font-weight: 600; }
  .live-pill { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #888; font-weight: 500; background: #f5f4f0; border-radius: 20px; padding: 4px 10px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; transition: background 0.3s; }
  .dot.live { background: #22c55e; animation: pulse 1.5s infinite; }
  .dot.scanning { background: #f59e0b; animation: pulse 0.7s infinite; }
  .dot.done { background: #22c55e; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .cam-body { background: #111; position: relative; min-height: 420px; display: flex; align-items: center; justify-content: center; }
  #video { width: 100%; display: none; max-height: 520px; object-fit: cover; }
  #canvas, #proc-canvas { display: none; }

  .cam-placeholder { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 2.5rem 2rem; text-align: center; }
  .cam-placeholder p { font-size: 13px; color: #aaa; max-width: 280px; line-height: 1.55; }
  .btn-start { padding: 10px 26px; background: #1d4ed8; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-start:hover { background: #1e40af; }

  /* Scan overlay — darkens everything OUTSIDE the frame */
  .scan-overlay { position: absolute; inset: 0; display: none; pointer-events: none; }
  .scan-overlay svg { width: 100%; height: 100%; }

  .hint { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; font-size: 11px; color: rgba(255,255,255,0.65); pointer-events: none; }

  .status-bar { padding: 9px 16px; font-size: 12px; min-height: 36px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #f0ede6; color: #888; transition: background 0.2s, color 0.2s; }
  .status-bar.ok { color: #16a34a; background: #f0fdf4; }
  .status-bar.err { color: #dc2626; background: #fef2f2; }
  .status-bar.warn { color: #92400e; background: #fffbeb; }
  .spinner { width:13px; height:13px; border:1.5px solid currentColor; border-top-color:transparent; border-radius:50%; animation:spin 0.7s linear infinite; flex-shrink:0; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .preview-wrap { display:none; padding: 8px 16px 12px; }
  .preview-row { display: flex; gap: 8px; }
  .preview-box { flex:1; text-align:center; }
  .preview-box p { font-size:10px; color:#999; margin-bottom:3px; text-transform:uppercase; letter-spacing:0.04em; }
  .preview-box img { width:100%; height:80px; object-fit:contain; border-radius:6px; border:1px solid #e2e0d8; background:#f8f8f6; }

  .raw-text-wrap { display: none; margin: 0 16px 12px; padding: 8px 12px; background: #f8f8f6; border: 1px solid #e8e6df; border-radius: 8px; font-size: 11px; color: #555; font-family: monospace; line-height: 1.5; max-height: 80px; overflow-y: auto; }

  .section-label { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
  .full { grid-column: 1 / -1; }
  .field { display:flex; flex-direction:column; gap:5px; }
  .field label { font-size:11px; font-weight:600; color:#999; text-transform:uppercase; letter-spacing:0.05em; }
  .field input { height:38px; padding:0 12px; border:1px solid #e2e0d8; border-radius:8px; font-size:14px; color:#1a1a1a; background:#fff; transition: border-color 0.2s, box-shadow 0.2s; }
  .field input:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,0.12); }
  .field input.filled { border-color:#22c55e; background:#f0fdf4; }

  .actions { display:flex; gap:10px; }
  .btn-clear { padding:9px 18px; border-radius:8px; border:1px solid #e2e0d8; background:#fff; cursor:pointer; font-size:13px; color:#666; font-weight:500; }
  .btn-clear:hover { background:#f5f4f0; }
  .btn-save { flex:1; padding:10px 24px; background:#1d4ed8; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
  .btn-save:hover:not(:disabled) { background:#1e40af; }
  .btn-save:disabled { opacity:0.35; cursor:not-allowed; }
  #rescan-btn { display:none; background:none; border:none; color:#1d4ed8; font-size:12px; cursor:pointer; text-decoration:underline; }
</style>
</head>
<body>
<div class="app">
  <h1>Address Scanner</h1>
  <p class="subtitle">Works offline · No API key needed</p>

  <div class="cam-card">
    <div class="cam-header">
      <span class="cam-title">Live camera</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="rescan-btn" onclick="rescan()">Scan again</button>
        <div class="live-pill">
          <div class="dot" id="dot"></div>
          <span id="live-label">ready</span>
        </div>
      </div>
    </div>

    <div class="cam-body" id="cam-body">
      <div class="cam-placeholder" id="placeholder">
        <p>Place the address label inside the frame — it scans automatically</p>
        <button class="btn-start" onclick="startScanner()">Start scanner</button>
      </div>
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <canvas id="proc-canvas"></canvas>

      <!-- SVG overlay: dims area outside the scan box -->
      <div class="scan-overlay" id="overlay">
        <svg id="overlay-svg" viewBox="0 0 400 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <mask id="cutout">
              <rect width="400" height="600" fill="white"/>
              <rect x="80" y="30" width="240" height="540" rx="10" fill="black"/>
            </mask>
          </defs>
          <rect width="400" height="600" fill="rgba(0,0,0,0.6)" mask="url(#cutout)"/>
          <rect x="80" y="30" width="240" height="540" rx="10" fill="none" stroke="rgba(96,165,250,0.85)" stroke-width="1.5"/>
          <polyline points="80,70 80,30 120,30" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
          <polyline points="280,30 320,30 320,70" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
          <polyline points="80,530 80,570 120,570" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
          <polyline points="280,570 320,570 320,530" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
          <line x1="82" y1="30" x2="318" y2="30" stroke="rgba(96,165,250,0.75)" stroke-width="2">
            <animateTransform attributeName="transform" type="translate" from="0,0" to="0,540" dur="2.5s" repeatCount="indefinite"/>
          </line>
        </svg>
      </div>
      <div class="hint" id="hint" style="display:none">Fill the label inside the blue frame · hold still</div>
    </div>

    <div class="status-bar" id="status-bar"><span id="status-msg">Press start to activate camera</span></div>
    <div class="preview-wrap" id="preview-wrap">
      <div class="preview-row">
        <div class="preview-box"><p>Cropped</p><img id="prev-crop" alt="cropped"></div>
        <div class="preview-box"><p>Processed (what OCR sees)</p><img id="prev-proc" alt="processed"></div>
      </div>
    </div>
    <div class="raw-text-wrap" id="raw-text"></div>
  </div>

  <p class="section-label">Detected address</p>
  <div class="form-grid">
    <div class="field full"><label>Name / Recipient</label><input type="text" id="f-name" placeholder="—"></div>
    <div class="field full"><label>House / Flat no.</label><input type="text" id="f-street1" placeholder="—"></div>
    <div class="field full"><label>Area / Locality</label><input type="text" id="f-street2" placeholder="—"></div>
    <div class="field"><label>City</label><input type="text" id="f-city" placeholder="—"></div>
    <div class="field"><label>State</label><input type="text" id="f-state" placeholder="—"></div>
    <div class="field"><label>PIN code</label><input type="text" id="f-zip" placeholder="—"></div>
    <div class="field"><label>Mobile</label><input type="text" id="f-mobile" placeholder="—"></div>
  </div>

  <div class="actions">
    <button class="btn-clear" onclick="clearAll()">Clear</button>
    <button class="btn-save" id="btn-save" disabled onclick="saveAddress()">Save address</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
let stream = null, scanInterval = null, isScanning = false, populated = false, worker = null;

const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const procCvs  = document.getElementById('proc-canvas');
const dot      = document.getElementById('dot');
const liveLabel= document.getElementById('live-label');
const statusBar= document.getElementById('status-bar');
const statusMsg= document.getElementById('status-msg');
const overlay  = document.getElementById('overlay');
const hint     = document.getElementById('hint');
const placeholder = document.getElementById('placeholder');
const rawTextEl= document.getElementById('raw-text');

// Scan frame dimensions as fractions of video size — portrait shape to match shipping labels
const FRAME = { x: 0.20, y: 0.05, w: 0.60, h: 0.90 };

function setStatus(msg, type) {
  statusBar.className = 'status-bar'+(type?' '+type:'');
  statusMsg.innerHTML = type==='scanning' ? '<div class="spinner"></div> '+msg : msg;
}
function setDot(state) {
  dot.className = 'dot'+(state?' '+state:'');
  liveLabel.textContent = {live:'live',scanning:'reading...',done:'done'}[state]||'ready';
}

// ── CROP to scan frame only ───────────────────────────────────────
function cropFrame() {
  if (!video.videoWidth) return null;
  const vw = video.videoWidth, vh = video.videoHeight;
  const cx = Math.round(FRAME.x * vw);
  const cy = Math.round(FRAME.y * vh);
  const cw = Math.round(FRAME.w * vw);
  const ch = Math.round(FRAME.h * vh);

  canvas.width = cw;
  canvas.height = ch;
  canvas.getContext('2d').drawImage(video, cx, cy, cw, ch, 0, 0, cw, ch);
  return canvas;
}

// ── IMAGE PREPROCESSING ──────────────────────────────────────────
function preprocess(src) {
  const scale = 3; // 3x upscale
  const w = src.width * scale;
  const h = src.height * scale;
  procCvs.width = w;
  procCvs.height = h;
  const ctx = procCvs.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(src, 0, 0, w, h);

  const id = ctx.getImageData(0, 0, w, h);
  const d  = id.data;

  // 1. Grayscale
  for (let i = 0; i < d.length; i += 4) {
    const g = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
    d[i] = d[i+1] = d[i+2] = g;
  }

  // 2. Compute mean brightness for adaptive threshold
  let sum = 0;
  for (let i = 0; i < d.length; i += 4) sum += d[i];
  const mean = sum / (d.length / 4);
  const thresh = mean * 0.85; // slightly below mean → catches dark text on light bg

  // 3. Binarize
  for (let i = 0; i < d.length; i += 4) {
    const val = d[i] < thresh ? 0 : 255;
    d[i] = d[i+1] = d[i+2] = val;
    d[i+3] = 255;
  }

  ctx.putImageData(id, 0, 0);
  return procCvs;
}

async function initWorker() {
  setStatus('Loading OCR engine (one-time download)...', 'scanning');
  worker = await Tesseract.createWorker('eng', 1, {
    logger: m => {
      if (m.status === 'recognizing text')
        setStatus('Reading... '+Math.round(m.progress*100)+'%', 'scanning');
    }
  });
  await worker.setParameters({
    tessedit_pageseg_mode: '6',   // uniform block of text
    preserve_interword_spaces: '1',
  });
}

async function startScanner() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: {ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080} }
    });
    video.srcObject = stream;
    video.style.display = 'block';
    placeholder.style.display = 'none';
    overlay.style.display = 'block';
    hint.style.display = 'block';
    setDot('live');
    await initWorker();
    setStatus('Hold the label steady inside the blue frame...');
    scanInterval = setInterval(captureAndScan, 5000);
    setTimeout(captureAndScan, 2500);
  } catch(e) {
    setStatus('Camera access denied — allow camera and refresh.', 'err');
  }
}

async function captureAndScan() {
  if (isScanning || populated) return;
  const cropped = cropFrame();
  if (!cropped) return;

  isScanning = true;
  setDot('scanning');
  setStatus('Processing image...', 'scanning');

  // Show previews
  document.getElementById('prev-crop').src = cropped.toDataURL();
  const processed = preprocess(cropped);
  document.getElementById('prev-proc').src = processed.toDataURL();
  document.getElementById('preview-wrap').style.display = 'block';

  try {
    const { data: { text } } = await worker.recognize(processed);
    const cleaned = text.trim();

    rawTextEl.style.display = 'block';
    rawTextEl.textContent = '📄 Raw OCR: ' + cleaned;

    if (!cleaned || cleaned.length < 8) {
      setDot('live');
      setStatus('No text found — bring label closer and hold still', 'warn');
      isScanning = false; return;
    }

    const parsed = parseIndianAddress(cleaned);
    if (!parsed.street1 && !parsed.city && !parsed.zip) {
      setDot('live');
      setStatus('Text found but address unclear — try again', 'warn');
    } else {
      populateForm(parsed);
    }
  } catch(e) {
    setDot('live');
    setStatus('OCR error — retrying...', 'err');
  }
  isScanning = false;
}

// ── ADDRESS PARSER tuned for Indian shipping labels ───────────────
function parseIndianAddress(text) {
  const r = { name:'', street1:'', street2:'', city:'', state:'', zip:'', mobile:'' };
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 1);

  lines.forEach(line => {
    const lo = line.toLowerCase();

    // PIN code — 6 digits
    const pin = line.match(/\b(\d{6})\b/);
    if (pin && !r.zip) r.zip = pin[1];

    // Mobile — 10 digits starting 6-9, with optional country code
    const mob = line.match(/(?:mobile[^0-9]*|number[^0-9]*|\+?91[-\s]?)?([6-9]\d{9})/i);
    if (mob && !r.mobile) r.mobile = mob[1];

    // State — "State up" / "State: Maharashtra"
    const stMatch = line.match(/state[^a-z]*([a-z\s]+)/i);
    if (stMatch && !r.state) r.state = stMatch[1].trim();

    // House / flat
    if (/house|flat|plot|door|h\.?no|villa|block/i.test(lo) && !r.street1)
      r.street1 = line.replace(/house\s*no\s*[-:]/i,'House No.').trim();

    // Area / locality
    if (/(nagar|colony|sector|vihar|puram|enclave|marg|road|street|layout|phase|devipura|vijay)/i.test(lo) && !r.street2)
      r.street2 = line.trim();

    // City — repeated standalone city name (common in Indian labels)
    if (pin && !r.city) {
      const guess = line.replace(pin[0],'').replace(/pin\s*code/i,'').replace(/,/g,'').trim();
      if (guess.length > 2) r.city = guess;
    }
  });

  // City fallback — look for line that has the PIN city
  if (!r.city && r.zip) {
    lines.forEach(line => {
      if (line.includes(r.zip)) {
        const c = line.replace(r.zip,'').replace(/pin\s*code/i,'').replace(/,/g,'').trim();
        if (c.length > 2 && !r.city) r.city = c;
      }
    });
  }

  // City second fallback — standalone city line (e.g. "Bulandshahr" repeated)
  if (!r.city && r.street2) {
    lines.forEach(line => {
      if (line.toLowerCase().includes(r.street2.toLowerCase().split(' ').pop()) && line !== r.street2 && !r.city)
        r.city = line.trim();
    });
  }

  // Name — first meaningful line that doesn't match address keywords
  for (const line of lines) {
    if (!/house|flat|plot|pin|state|mobile|order|ordee|no\.|nagar|colony|\d{6}|\d{10}|devipura/i.test(line) && line.length > 3) {
      r.name = line; break;
    }
  }

  Object.keys(r).forEach(k => { r[k] = r[k].replace(/\s+/g,' ').trim(); });
  return r;
}

function populateForm(addr) {
  const map = { 'f-name':addr.name,'f-street1':addr.street1,'f-street2':addr.street2,'f-city':addr.city,'f-state':addr.state,'f-zip':addr.zip,'f-mobile':addr.mobile };
  Object.entries(map).forEach(([id,val]) => {
    const el = document.getElementById(id);
    if (el && val) { el.value = val; el.classList.add('filled'); }
  });
  populated = true;
  clearInterval(scanInterval);
  if (stream) stream.getTracks().forEach(t => t.stop());
  video.style.display = 'none';
  overlay.style.display = 'none';
  hint.style.display = 'none';
  setDot('done');
  setStatus('Address detected and filled in!', 'ok');
  document.getElementById('btn-save').disabled = false;
  document.getElementById('rescan-btn').style.display = 'block';
}

function rescan() {
  clearAll();
  document.getElementById('rescan-btn').style.display = 'none';
  startScanner();
}

function clearAll() {
  ['f-name','f-street1','f-street2','f-city','f-state','f-zip','f-mobile'].forEach(id => {
    const el = document.getElementById(id);
    el.value = ''; el.classList.remove('filled');
  });
  document.getElementById('btn-save').disabled = true;
  rawTextEl.style.display = 'none';
  document.getElementById('preview-wrap').style.display = 'none';
  populated = false;
  clearInterval(scanInterval);
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  video.style.display = 'none';
  overlay.style.display = 'none';
  hint.style.display = 'none';
  placeholder.style.display = 'flex';
  setDot(''); liveLabel.textContent = 'ready';
  setStatus('Press start to activate camera');
}

function saveAddress() {
  const lines = ['f-name','f-street1','f-street2','f-city','f-state','f-zip','f-mobile']
    .map(id => document.getElementById(id).value).filter(Boolean).join('\n');
  alert('Saved:\n\n' + lines);
}
</script>
</body>
</html>
